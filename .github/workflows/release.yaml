name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    if: github.repository == 'Tonkic/CLIProxyAPIPlus'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.26.0'
          cache: true

      - name: Create release tag
        id: tag
        shell: bash
        run: |
          version="v$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
          git tag "${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - name: Generate build metadata
        shell: bash
        run: |
          echo "COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Download CPA Usage Keeper binaries
        shell: bash
        env:
          KEEPER_VERSION: v1.4.0
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/keeper .keeper-dist/linux/amd64 .keeper-dist/linux/arm64 .keeper-dist/windows/amd64 .keeper-dist/windows/arm64
          for target in linux_amd64 linux_arm64 windows_amd64 windows_arm64; do
            GH_TOKEN="${GITHUB_TOKEN}" gh release download "${KEEPER_VERSION}" --repo Willxup/cpa-usage-keeper --pattern "cpa-usage-keeper_${KEEPER_VERSION}_${target}.*" --dir /tmp/keeper
          done
          for target in linux_amd64 linux_arm64; do
            workdir="/tmp/keeper/${target}"
            mkdir -p "${workdir}"
            tar -xzf "/tmp/keeper/cpa-usage-keeper_${KEEPER_VERSION}_${target}.tar.gz" -C "${workdir}"
            keeper_bin=$(find "${workdir}" -type f -name cpa-usage-keeper | head -n 1)
            test -n "${keeper_bin}"
            os=${target%_*}
            arch=${target#*_}
            cp "${keeper_bin}" ".keeper-dist/${os}/${arch}/cpa-usage-keeper"
          done
          for target in windows_amd64 windows_arm64; do
            workdir="/tmp/keeper/${target}"
            mkdir -p "${workdir}"
            unzip -q "/tmp/keeper/cpa-usage-keeper_${KEEPER_VERSION}_${target}.zip" -d "${workdir}"
            keeper_bin=$(find "${workdir}" -type f -name cpa-usage-keeper.exe | head -n 1)
            test -n "${keeper_bin}"
            os=${target%_*}
            arch=${target#*_}
            cp "${keeper_bin}" ".keeper-dist/${os}/${arch}/cpa-usage-keeper.exe"
          done

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.VERSION }}
          COMMIT: ${{ env.COMMIT }}
          BUILD_DATE: ${{ env.BUILD_DATE }}
