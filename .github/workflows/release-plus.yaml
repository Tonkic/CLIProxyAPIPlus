name: release-plus

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v6.10.9.1'
        required: true
        type: string
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.26.0'
          cache: true

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Resolve release version
        id: tag
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${INPUT_VERSION}"
            if [[ "${version}" != v* ]]; then
              version="v${version}"
            fi
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${version}" >&2
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
            git tag "${version}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - name: Generate build metadata
        shell: bash
        run: |
          echo "COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Sync Codex CLI version defaults
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          auth_header=()
          if [ -n "${GH_TOKEN:-}" ]; then
            auth_header=(-H "Authorization: Bearer ${GH_TOKEN}")
          fi

          release_json="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "${auth_header[@]}" \
            https://api.github.com/repos/openai/codex/releases/latest)"

          codex_version="$(python3 -c 'import json, re, sys
          data = json.load(sys.stdin)
          tag = str(data.get("tag_name", "")).strip()
          name = str(data.get("name", "")).strip()
          for candidate in (tag, name):
              match = re.search(r"(?<![0-9])([0-9]+\.[0-9]+\.[0-9]+)(?![0-9])", candidate)
              if match:
                  print(match.group(1))
                  break
          else:
              raise SystemExit(f"invalid openai/codex release tag/name: {tag!r} / {name!r}")
          ' <<< "${release_json}")"

          echo "Using openai/codex ${codex_version} for Codex client defaults."
          python3 - "${codex_version}" <<'PY'
          import pathlib
          import re
          import sys

          version = sys.argv[1]
          tui_ua = f"codex-tui/{version} (Mac OS 26.5.0; arm64) iTerm.app/3.6.10 (codex-tui; {version})"
          cli_ua = f"codex_cli_rs/{version} (Mac OS 14.2.0; arm64) vscode/1.111.0"

          executor = pathlib.Path("internal/runtime/executor/codex_executor.go")
          text = executor.read_text(encoding="utf-8")
          text, count = re.subn(
              r'codexUserAgent\s*=\s*"[^"]+"',
              f'codexUserAgent             = "{tui_ua}"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("failed to update codexUserAgent")
          executor.write_text(text, encoding="utf-8")

          config = pathlib.Path("config.example.yaml")
          text = config.read_text(encoding="utf-8")
          text, count = re.subn(
              r'(?m)^(\s*#\s+user-agent:\s+)"codex_cli_rs/[^"]+"',
              rf'\1"{cli_ua}"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("failed to update config.example.yaml codex user-agent")
          config.write_text(text, encoding="utf-8")
          PY

      - name: Download CPA-Manager-Plus binaries
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MANAGER_VERSION: v1.11.2
        run: |
          set -euo pipefail
          base_url="https://github.com/seakee/CPA-Manager-Plus/releases/download/${MANAGER_VERSION}"
          release_assets=$(gh release view "${MANAGER_VERSION}" --repo seakee/CPA-Manager-Plus --json assets --jq '.assets[].name')
          mkdir -p /tmp/manager .manager-dist/linux/amd64/manager .manager-dist/linux/arm64/manager .manager-dist/windows/amd64/manager .manager-dist/windows/arm64/manager
          for target in linux_amd64 linux_arm64 windows_amd64 windows_arm64; do
            case "${target}" in
              linux_*)
                ext="tar.gz"
                ;;
              windows_*)
                ext="zip"
                ;;
              *)
                echo "unsupported manager target: ${target}" >&2
                exit 1
                ;;
            esac
            asset="cpa-manager-plus_${MANAGER_VERSION}_${target}.${ext}"
            printf '%s\n' "${release_assets}" | grep -Fx "${asset}" >/dev/null
            curl -fL --retry 5 --retry-delay 2 --retry-connrefused "${base_url}/${asset}" -o "/tmp/manager/${asset}"
          done
          for target in linux_amd64 linux_arm64; do
            workdir="/tmp/manager/${target}"
            mkdir -p "${workdir}"
            tar -xzf "/tmp/manager/cpa-manager-plus_${MANAGER_VERSION}_${target}.tar.gz" -C "${workdir}"
            manager_bin=$(find "${workdir}" -type f -name cpa-manager-plus | head -n 1)
            test -n "${manager_bin}"
            os=${target%_*}
            arch=${target#*_}
            cp "${manager_bin}" ".manager-dist/${os}/${arch}/manager/cpa-manager-plus"
          done
          for target in windows_amd64 windows_arm64; do
            workdir="/tmp/manager/${target}"
            mkdir -p "${workdir}"
            unzip -q "/tmp/manager/cpa-manager-plus_${MANAGER_VERSION}_${target}.zip" -d "${workdir}"
            manager_bin=$(find "${workdir}" -type f -name cpa-manager-plus.exe | head -n 1)
            test -n "${manager_bin}"
            os=${target%_*}
            arch=${target#*_}
            cp "${manager_bin}" ".manager-dist/${os}/${arch}/manager/cpa-manager-plus.exe"
          done

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.VERSION }}
          COMMIT: ${{ env.COMMIT }}
          BUILD_DATE: ${{ env.BUILD_DATE }}

      - name: Sync release assets to Aliyun OSS
        shell: bash
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          OSS_PREFIX: ${{ vars.ALIYUN_OSS_PREFIX }}
          OSS_KEEP_RELEASES: ${{ vars.ALIYUN_OSS_KEEP_RELEASES }}
        run: |
          set -euo pipefail

          if [ -z "${OSS_ACCESS_KEY_ID}" ] || [ -z "${OSS_ACCESS_KEY_SECRET}" ] || [ -z "${OSS_ENDPOINT}" ] || [ -z "${OSS_BUCKET}" ]; then
            echo "Aliyun OSS secrets are not configured; skipping OSS sync."
            exit 0
          fi

          go install github.com/aliyun/ossutil@v1.7.19
          OSSUTIL="$(go env GOPATH)/bin/ossutil"

          prefix="${OSS_PREFIX:-CLIProxyAPIPlus}"
          prefix="${prefix#/}"
          prefix="${prefix%/}"
          target="oss://${OSS_BUCKET}/${prefix}/${VERSION}"

          echo "Uploading release assets to ${target}/"
          while IFS= read -r file; do
            name="$(basename "${file}")"
            "${OSSUTIL}" cp "${file}" "${target}/${name}" -f -e "${OSS_ENDPOINT}" -i "${OSS_ACCESS_KEY_ID}" -k "${OSS_ACCESS_KEY_SECRET}"
          done < <(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name 'checksums.txt' \) | sort)

          keep_releases="${OSS_KEEP_RELEASES:-3}"
          if ! [[ "${keep_releases}" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid OSS_KEEP_RELEASES: ${keep_releases}" >&2
            exit 1
          fi

          base="oss://${OSS_BUCKET}/${prefix}/"
          mapfile -t versions < <(
            "${OSSUTIL}" ls "${base}" -e "${OSS_ENDPOINT}" -i "${OSS_ACCESS_KEY_ID}" -k "${OSS_ACCESS_KEY_SECRET}" |
              awk -v base="${base}" '
                index($NF, base) == 1 {
                  relative = substr($NF, length(base) + 1)
                  split(relative, parts, "/")
                  if (parts[1] ~ /^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$/) {
                    print parts[1]
                  }
                }
              ' | sort -Vu
          )

          delete_count=$((${#versions[@]} - keep_releases))
          if [ "${delete_count}" -gt 0 ]; then
            echo "Keeping the newest ${keep_releases} OSS releases; deleting ${delete_count} older release(s)."
            for ((index = 0; index < delete_count; index++)); do
              old_version="${versions[index]}"
              old_target="${base}${old_version}/"
              echo "Deleting old OSS release: ${old_target}"
              "${OSSUTIL}" rm "${old_target}" -r -f -e "${OSS_ENDPOINT}" -i "${OSS_ACCESS_KEY_ID}" -k "${OSS_ACCESS_KEY_SECRET}"
            done
          else
            echo "OSS release count (${#versions[@]}) is within the retention limit (${keep_releases})."
          fi

          echo "OSS sync complete."
