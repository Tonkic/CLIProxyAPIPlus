version: 2

builds:
  - id: "cli-proxy-api-plus"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/server/
    binary: cli-proxy-api-plus
    ldflags:
      - -s -w -X 'main.Version={{.Version}}-plus' -X 'main.Commit={{.ShortCommit}}' -X 'main.BuildDate={{.Date}}'

archives:
  - id: "cli-proxy-api-plus"
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{- if eq .Arch "arm64" -}}aarch64{{- else -}}{{ .Arch }}{{- end -}}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - README_CN.md
      - README_JA.md
      - config.example.yaml
      - start-plus-with-keeper.ps1
      - start-plus-with-keeper.sh
      - src: keeper/.env.example
        dst: keeper/.env.example
      - src: dist/keeper/{{ .Os }}/{{ .Arch }}/cpa-usage-keeper{{ if eq .Os "windows" }}.exe{{ end }}
        dst: keeper/cpa-usage-keeper{{ if eq .Os "windows" }}.exe{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
